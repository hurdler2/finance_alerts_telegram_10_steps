worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # ── Rate limiting ──────────────────────────────────────────────────────
    # 60 requests/minute per IP on admin endpoints
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=60r/m;
    # 600 requests/minute per IP on webhook
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=600r/m;

    # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + proxy ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name yourdomain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 1m;

        # ── Health (no rate limit) ────────────────────────────────────────
        location /health {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }

        # ── Admin endpoints (rate limited) ────────────────────────────────
        location /admin/ {
            limit_req zone=admin_limit burst=20 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Stripe webhook ────────────────────────────────────────────────
        location /stripe/webhook {
            limit_req zone=webhook_limit burst=50 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Raw body required for Stripe signature verification
            proxy_set_header Content-Type $content_type;
        }

        # ── Block everything else ─────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
