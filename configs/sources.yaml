  - id: guardian_business
    name: "The Guardian — Business"
    rss_url: "https://www.theguardian.com/business/rss"
    home_url: "https://www.theguardian.com/business"
    category: geopolitical
    priority: 3
    enabled: true
    has_rss: true
    scrape_allowed: true
    lang: en

  # ── BANKING / FINANCIAL STABILITY ─────────────────────────────────────────

  - id: ft_banking
    name: "Financial Times — Banking"
    rss_url: "https://www.ft.com/banking?format=rss"
    home_url: "https://www.ft.com/banking"
    category: banking
    priority: 1
    enabled: true
    has_rss: true
    scrape_allowed: false
    lang: en
    notes: "Paywalled — headlines only. High value for banking signals."

# ── GLOBAL DEFAULTS ──────────────────────────────────────────────────────────
defaults:
  poll_interval_minutes: 5
  request_timeout_seconds: 15
  max_retries: 3
  retry_backoff_seconds: 30
  user_agent: "FinanceAlertsBot/1.0 (+https://yoursite.com/bot)"
  max_articles_per_fetch: 50