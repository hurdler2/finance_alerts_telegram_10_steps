  - id: decrypt_news
    name: "Decrypt"
    rss_url: "https://decrypt.co/feed"
    home_url: "https://decrypt.co/"
    category: crypto
    priority: 3
    enabled: false
    has_rss: true
    scrape_allowed: true
    lang: en
    notes: "Enabled in v2 — lower priority for MVP."

  # ── ENERGY ─────────────────────────────────────────────────────────────────

  - id: oilprice_news
    name: "OilPrice.com"
    rss_url: "https://oilprice.com/rss/main"
    home_url: "https://oilprice.com/"
    category: energy
    priority: 3
    enabled: true
    has_rss: true
    scrape_allowed: true
