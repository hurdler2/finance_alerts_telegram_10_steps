  # ── CRYPTO ─────────────────────────────────────────────────────────────────

  - id: coindesk_news
    name: "CoinDesk News"
    rss_url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
    home_url: "https://www.coindesk.com/"
